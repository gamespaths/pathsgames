<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paths Games — Admin: Guest Management (v0.12.0)</title>
  <meta name="description" content="Paths Games: Admin panel for guest user management" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />
  <link rel="stylesheet" href="../v0.12.0/variables.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ═══════════════ NAVBAR ═══════════════ -->
  <nav class="navbar">
    <a class="navbar-brand" href="#">
      <i class="fas fa-dice-d20"></i> Paths Games
    </a>
    <div class="navbar-title">
      <i class="fas fa-crown"></i> Admin Panel
    </div>
    <div class="navbar-status" id="serverStatus">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">Connecting...</span>
    </div>
  </nav>

  <!-- ═══════════════ MAIN ═══════════════ -->
  <main class="page-wrap">

    <!-- ── STATS PANEL ── -->
    <section class="stats-panel" id="statsPanel">
      <h2 class="section-title"><i class="fas fa-chart-bar"></i> Guest Statistics</h2>
      <div class="stats-grid">
        <div class="stat-card stat-total">
          <div class="stat-value" id="statTotal">—</div>
          <div class="stat-label">Total Guests</div>
        </div>
        <div class="stat-card stat-active">
          <div class="stat-value" id="statActive">—</div>
          <div class="stat-label">Active</div>
        </div>
        <div class="stat-card stat-expired">
          <div class="stat-value" id="statExpired">—</div>
          <div class="stat-label">Expired</div>
        </div>
      </div>
    </section>

    <!-- ── ACTIONS BAR ── -->
    <section class="actions-bar">
      <button class="btn-action btn-refresh" onclick="loadData()">
        <i class="fas fa-sync-alt"></i> Refresh
      </button>
      <button class="btn-action btn-cleanup" onclick="cleanupExpired()">
        <i class="fas fa-broom"></i> Cleanup Expired
      </button>
      <button class="btn-action btn-create" onclick="createGuest()">
        <i class="fas fa-user-plus"></i> Create Guest
      </button>
    </section>

    <!-- ── NOTIFICATION ── -->
    <div id="notification" class="notification" style="display:none;"></div>

    <!-- ── GUEST TABLE ── -->
    <section class="table-panel">
      <h2 class="section-title"><i class="fas fa-users"></i> Guest Users</h2>
      <div class="table-wrapper">
        <table class="guest-table" id="guestTable">
          <thead>
            <tr>
              <th>Username</th>
              <th>UUID</th>
              <th>Status</th>
              <th>Registered</th>
              <th>Last Access</th>
              <th>Expires</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="guestTableBody">
            <tr><td colspan="7" class="loading-row"><i class="fas fa-spinner fa-spin"></i> Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </section>

    <!-- ── GUEST DETAIL MODAL ── -->
    <div class="modal-overlay" id="modalOverlay" style="display:none;" onclick="closeModal(event)">
      <div class="modal-card" onclick="event.stopPropagation()">
        <div class="modal-header">
          <h3><i class="fas fa-user-shield"></i> Guest Details</h3>
          <button class="modal-close" onclick="closeModal()">&times;</button>
        </div>
        <div class="modal-body" id="modalBody">
          <!-- filled by JS -->
        </div>
        <div class="modal-footer">
          <button class="btn-action btn-delete" id="modalDeleteBtn" onclick="deleteFromModal()">
            <i class="fas fa-trash"></i> Delete
          </button>
          <button class="btn-action btn-close" onclick="closeModal()">Close</button>
        </div>
      </div>
    </div>

  </main>

  <!-- ═══════════════ FOOTER ═══════════════ -->
  <footer class="page-footer">
    &copy; 2026 Paths Games — Admin Panel — v0.12.0-admin
  </footer>

  <script src="admin-guests.js"></script>
</body>
</html>
