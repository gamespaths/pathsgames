# SonarCloud configuration for Paths Games AWS Lambda Backend
sonar.projectKey=pathsgames_backend-aws-lambda
sonar.organization=gamespaths
sonar.projectName=Backend AWS Lambda

sonar.sources=lambda
sonar.tests=tests
sonar.sourceEncoding=UTF-8

# Python settings
sonar.language=py
sonar.python.version=3.13
sonar.python.coverage.reportPaths=coverage.xml

# Exclusions
sonar.exclusions=**/__pycache__/**,.aws-sam/**
sonar.coverage.exclusions=tests/**


