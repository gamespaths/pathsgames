AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: 'Paths Games - Backend Serverless (AWS SAM)'

Parameters:
  Environment:
    Type: String
    Default: dev
    Description: 'Ambiente di deploy (dev, prod, ecc.)'
  JwtSecret:
    Type: String
    NoEcho: true
    Default: PathsGamesDevSecret2026_MustBeAtLeast32Chars!
    Description: 'Secret key for JWT verification'

Resources:
  # DynamoDB Table (Single Table Design)
  PathsGamesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "PathsGamesBackend-${Environment}"
      Tags:
        - Key: project
          Value: PathsGames
        - Key: env
          Value: !Ref Environment
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1_PK
          AttributeType: S
        - AttributeName: GSI1_SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1_PK
              KeyType: HASH
            - AttributeName: GSI1_SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  # HTTP API (API Gateway v2)
  PathsGamesApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref Environment
      Tags:
        project: PathsGames
        env: !Ref Environment
      CorsConfiguration:
        AllowMethods: [GET, POST, DELETE, OPTIONS]
        AllowOrigins:
          - "http://localhost"
          - "http://localhost:3000"
          - "http://localhost:5173"
          - "http://localhost:8042"
          - "http://localhost:8080"
          - "http://127.0.0.1"
          - "http://127.0.0.1:3000"
          - "http://127.0.0.1:8042"
          - "http://127.0.0.1:8080"
          - "http://127.0.0.1:5500"
        AllowHeaders: [Content-Type, Authorization, Cookie]
        AllowCredentials: true

  # Nested Stacks (Modules)
  
  EchoModule:
    Type: AWS::Serverless::Application
    Properties:
      Location: template/echo.yaml
      Parameters:
        Environment: !Ref Environment
        TableName: !Ref PathsGamesTable
        ApiId: !Ref PathsGamesApi

  AuthModule:
    Type: AWS::Serverless::Application
    Properties:
      Location: template/auth.yaml
      Parameters:
        Environment: !Ref Environment
        TableName: !Ref PathsGamesTable
        ApiId: !Ref PathsGamesApi
        JwtSecret: !Ref JwtSecret

  StoryModule:
    Type: AWS::Serverless::Application
    Properties:
      Location: template/story.yaml
      Parameters:
        Environment: !Ref Environment
        TableName: !Ref PathsGamesTable
        ApiId: !Ref PathsGamesApi

  ContentModule:
    Type: AWS::Serverless::Application
    Properties:
      Location: template/content.yaml
      Parameters:
        Environment: !Ref Environment
        TableName: !Ref PathsGamesTable
        ApiId: !Ref PathsGamesApi

  SeedModule:
    Type: AWS::Serverless::Application
    Properties:
      Location: template/seed.yaml
      Parameters:
        Environment: !Ref Environment
        TableName: !Ref PathsGamesTable
        ApiId: !Ref PathsGamesApi

Outputs:
  ApiUrl:
    Description: "API Endpoint URL"
    Value: !Sub "https://${PathsGamesApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}/"
  TableName:
    Description: "DynamoDB Table Name"
    Value: !Ref PathsGamesTable
  SeedEndpoint:
    Description: "Dev seed endpoint"
    Value: !Sub "https://${PathsGamesApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}/api/dev/seed"
