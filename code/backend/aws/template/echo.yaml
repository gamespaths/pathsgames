AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Parameters:
  Environment:
    Type: String
  TableName:
    Type: String
  ApiId:
    Type: String

Resources:
  EchoLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Delete
    Properties:
      LogGroupName: !Sub "/aws/lambda/pathsgames-${Environment}-EchoFunction"
      RetentionInDays: 14
      Tags:
        - Key: project
          Value: PathsGames
        - Key: env
          Value: !Ref Environment

  EchoFunction:
    Type: AWS::Serverless::Function
    DependsOn: EchoLogGroup
    Properties:
      FunctionName: !Sub "pathsgames-${Environment}-EchoFunction"
      Runtime: python3.13
      Handler: handler.lambda_handler
      Timeout: 30
      MemorySize: 256
      CodeUri: ../lambda/echo/
      Tags:
        project: PathsGames
        env: !Ref Environment
      Environment:
        Variables:
          TABLE_NAME: !Ref TableName
          ENV: !Ref Environment
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TableName

  EchoIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref ApiId
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt EchoFunction.Arn
      PayloadFormatVersion: "2.0"

  EchoRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiId
      RouteKey: "GET /api/echo/status"
      Target: !Sub "integrations/${EchoIntegration}"

  EchoPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref EchoFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiId}/*"
