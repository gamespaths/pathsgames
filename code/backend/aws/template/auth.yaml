AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Parameters:
  Environment:
    Type: String
  TableName:
    Type: String
  ApiId:
    Type: String
  JwtSecret:
    Type: String

Resources:
  AuthLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Delete
    Properties:
      LogGroupName: !Sub "/aws/lambda/pathsgames-${Environment}-AuthFunction"
      RetentionInDays: 14
      Tags:
        - Key: project
          Value: PathsGames
        - Key: env
          Value: !Ref Environment

  AuthFunction:
    Type: AWS::Serverless::Function
    DependsOn: AuthLogGroup
    Properties:
      FunctionName: !Sub "pathsgames-${Environment}-AuthFunction"
      Runtime: python3.13
      Handler: auth.handler.lambda_handler
      Timeout: 30
      MemorySize: 256
      CodeUri: ../lambda/
      Tags:
        project: PathsGames
        env: !Ref Environment
      Environment:
        Variables:
          TABLE_NAME: !Ref TableName
          ENV: !Ref Environment
          JWT_SECRET: !Ref JwtSecret
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TableName

  AuthIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref ApiId
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt AuthFunction.Arn
      PayloadFormatVersion: "2.0"

  AuthPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref AuthFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiId}/*"

  GuestLoginRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiId
      RouteKey: "POST /api/auth/guest"
      Target: !Sub "integrations/${AuthIntegration}"

  ResumeGuestRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiId
      RouteKey: "POST /api/auth/guest/resume"
      Target: !Sub "integrations/${AuthIntegration}"

  RefreshTokenRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiId
      RouteKey: "POST /api/auth/refresh"
      Target: !Sub "integrations/${AuthIntegration}"

  LogoutRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiId
      RouteKey: "POST /api/auth/logout"
      Target: !Sub "integrations/${AuthIntegration}"

  LogoutAllRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiId
      RouteKey: "POST /api/auth/logout/all"
      Target: !Sub "integrations/${AuthIntegration}"

  GetMeRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiId
      RouteKey: "GET /api/auth/me"
      Target: !Sub "integrations/${AuthIntegration}"

  ListGuestsRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiId
      RouteKey: "GET /api/admin/guests"
      Target: !Sub "integrations/${AuthIntegration}"

  GuestStatsRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiId
      RouteKey: "GET /api/admin/guests/stats"
      Target: !Sub "integrations/${AuthIntegration}"

  CleanupExpiredGuestsRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiId
      RouteKey: "DELETE /api/admin/guests/expired"
      Target: !Sub "integrations/${AuthIntegration}"

  GetGuestByUuidRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiId
      RouteKey: "GET /api/admin/guests/{uuid}"
      Target: !Sub "integrations/${AuthIntegration}"

  DeleteGuestRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiId
      RouteKey: "DELETE /api/admin/guests/{uuid}"
      Target: !Sub "integrations/${AuthIntegration}"
