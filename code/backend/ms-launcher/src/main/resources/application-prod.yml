# Production profile - PostgreSQL, optimized settings
server:
  port: 8042

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:pathsgames}
    username: ${DB_USERNAME:pathsgames}
    password: ${DB_PASSWORD:pathsgames}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: "0"
    validate-on-migrate: true
    repair-on-migrate: false

game:
  server:
    status: OK
    env: production
  auth:
    cors:
      allowed-origins: https://paths.games,https://www.paths.games,https://pathsgames.com
