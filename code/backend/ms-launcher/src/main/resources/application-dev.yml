# Development profile - SQLite, debug logging
server:
  port: 8042

spring:
  datasource:
    url: jdbc:sqlite:${game.database.path}
    driver-class-name: org.sqlite.JDBC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: "0"
    validate-on-migrate: false
    repair-on-migrate: true

game:
  server:
    status: OK
    env: development
