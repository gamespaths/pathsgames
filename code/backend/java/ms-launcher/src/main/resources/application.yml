spring:
  application:
    name: paths-game-backend
  profiles:
    active: dev

game:
  server:
    version: 0.14.3
    # manually change this version if needed >0.13.0
  database:
    # Configurable SQLite path — override with -Dgame.database.path=/your/path
    path: ${user.home}/.paths.games/database.sqlite
  auth:
    jwt:
      # HMAC-SHA256 secret key (min 32 chars). Override in production via env variable or -D option.
      secret: ${JWT_SECRET:PathsGamesDevSecret2026_MustBeAtLeast32Chars!}
      access-token-minutes: 30
      refresh-token-days: 7
    max-tokens-per-user: 5
    admin-path-prefix: /api/admin/
    public-paths: /api/echo/**,/api/auth/guest,/api/auth/guest/resume,/api/auth/refresh,/api/versions,/api/stories,/api/stories/**
    cookie: # HttpOnly cookies for refreshToken and guestCookieToken (XSS blast-radius reduction)
      same-site: Lax
  admin:
    auth:
      guest:
        cleanup:
          cron: 0 42 0 * * ? #runs at 00:42 every day GuestSessionCleanupScheduler
