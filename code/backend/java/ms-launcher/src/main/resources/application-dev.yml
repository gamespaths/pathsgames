# Development profile - SQLite, debug logging
server:
  port: 8042

spring:
  datasource:
    url: jdbc:sqlite:${game.database.path}
    driver-class-name: org.sqlite.JDBC
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: "0"
    validate-on-migrate: false
    repair-on-migrate: true

game:
  server:
    status: OK
    env: development
  auth:
    cors:
      allowed-origins: #http://localhost:3000,http://localhost:8042,http://127.0.0.1:5500
        - "http://localhost:3000"
        - "http://localhost:8042"
        - "http://127.0.0.1:5500"
        - "http://localhost:5500"
        - "http://localhost:5173"
        - "http://localhost:8080"
        - "http://pathsgames.com"
        - "http://www.pathsgames.com"
        - "https://pathsgames.com"
        - "https://www.pathsgames.com"
        - "null" # for file:///
    cookie:
      # SameSite=None allows cookies to be sent in cross-origin requests during development
      # (e.g. from http://127.0.0.1:5500 or file:// to http://localhost:8042).
      # SameSite=None REQUIRES Secure=true — Chrome enforces this since v80.
      # Chrome treats localhost as a "secure context", so Secure cookies work over
      # plain HTTP on http://localhost:8042 without HTTPS.
      same-site: None
