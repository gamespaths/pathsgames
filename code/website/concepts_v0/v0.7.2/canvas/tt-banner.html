<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>TikTok Profile Banner — 1000×280</title>
<style>
  body{margin:0;background:#100800;color:#e8d5b0;font-family:'Crimson Text',Georgia,serif;display:flex;flex-direction:column;align-items:center;padding:24px}
  h1{font-size:18px;margin:0 0 4px;color:#e8b830}
  .info{color:#8b7355;font-size:13px;margin-bottom:12px}
  canvas{max-width:100%;height:auto;border-radius:6px;box-shadow:0 4px 24px rgba(0,0,0,.6)}
  .actions{margin-top:14px}
  button{background:linear-gradient(180deg,#c08040,#d9a060);color:#5c3700;border:none;padding:10px 18px;border-radius:6px;font-weight:700;cursor:pointer;font-size:14px}
</style>
</head>
<body>
<h1>TikTok — Banner Profilo</h1>
<p class="info">1000 × 280</p>
<canvas id="c" width="1000" height="280"></canvas>
<div class="actions"><button onclick="dl()">⬇ Scarica PNG</button></div>
<script>
const W=1000,H=280,c=document.getElementById('c'),ctx=c.getContext('2d');
const FONTS=Promise.all([
  new FontFace('CinzelDec','url(https://fonts.gstatic.com/s/cinzeldecorative/v17/daaCSScvJGqLYhG8nNt8KPPswUAPni7TTMw.woff2)').load(),
  new FontFace('Cinzel','url(https://fonts.gstatic.com/s/cinzel/v23/8vIU7ww63mVu7gtR-kwKxNvkNOjw-tbnfY3lCA.woff2)').load(),
  new FontFace('FA5','url(https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/webfonts/fa-solid-900.woff2)',{weight:'900'}).load()
]).then(ff=>ff.forEach(f=>document.fonts.add(f)));
FONTS.then(draw,draw);

function draw(){
  /* ═══ NAVBAR-STYLE BACKGROUND (full banner = navbar look) ═══ */
  const bg=ctx.createLinearGradient(0,0,W*0.8,0);
  bg.addColorStop(0,'#1a0a02');bg.addColorStop(1,'#5c3317');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

  /* Gold border lines top & bottom (like navbar border-bottom) */
  ctx.fillStyle='#9a6f08';
  ctx.fillRect(0,0,W,3);ctx.fillRect(0,H-3,W,3);

  /* Central glow */
  const gl=ctx.createRadialGradient(W/2,H/2,10,W/2,H/2,400);
  gl.addColorStop(0,'rgba(200,150,10,0.08)');gl.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=gl;ctx.fillRect(0,0,W,H);

  ctx.textAlign='center';ctx.textBaseline='middle';

  /* D20 icon left */
  ctx.font='900 60px FA5';ctx.fillStyle='#e8b830';
  ctx.shadowColor='rgba(232,184,48,0.8)';ctx.shadowBlur=20;
  ctx.fillText('\uf6cf',100,H/2);
  ctx.shadowBlur=0;

  /* Brand name */
  ctx.font='bold 60px CinzelDec,serif';
  ctx.fillStyle='#e8b830';
  ctx.shadowColor='rgba(232,184,48,0.5)';ctx.shadowBlur=16;
  ctx.fillText('Paths Games',W/2+20,H/2-20);
  ctx.shadowBlur=0;

  /* Tagline — from crowdfund section */
  ctx.font='22px Cinzel,serif';ctx.fillStyle='#e8d5b0';
  ctx.fillText('A Gamebook Videogame · Free to Play · Crowdfunding Coming Soon',W/2+20,H/2+30);

  /* Badge pills bottom row */
  const labels=['🔓 Free to Play','📖 Gamebook RPG','🔀 Branching Stories','👥 Multiplayer','💰 Crowdfunding','💻 Open Source'];
  ctx.font='14px Cinzel,serif';
  let total=labels.reduce((a,l)=>a+ctx.measureText(l).width+30,0);
  let sx=W/2-total/2+10;
  labels.forEach(label=>{
    const tw=ctx.measureText(label).width;
    const bpG=ctx.createLinearGradient(sx,H-52,sx,H-24);
    bpG.addColorStop(0,'#c08040');bpG.addColorStop(1,'#d9a060');
    ctx.fillStyle=bpG;
    roundRect(ctx,sx-6,H-52,tw+12,28,4);ctx.fill();
    ctx.strokeStyle='rgba(200,150,10,0.3)';ctx.lineWidth=1;
    roundRect(ctx,sx-6,H-52,tw+12,28,4);ctx.stroke();
    ctx.fillStyle='#5c3700';ctx.textAlign='left';
    ctx.fillText(label,sx,H-34);
    ctx.textAlign='center';
    sx+=tw+30;
  });
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();
}
function dl(){const a=document.createElement('a');a.download='paths-games-tt-banner.png';a.href=c.toDataURL('image/png');a.click()}
</script>
</body>
</html>
