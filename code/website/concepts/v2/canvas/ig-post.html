<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Instagram Post — 1080×1080</title>
<style>
  body{margin:0;background:#100800;color:#e8d5b0;font-family:'Crimson Text',Georgia,serif;display:flex;flex-direction:column;align-items:center;padding:24px}
  h1{font-size:18px;margin:0 0 4px;color:#e8b830}
  .info{color:#8b7355;font-size:13px;margin-bottom:12px}
  canvas{max-width:540px;height:auto;border-radius:6px;box-shadow:0 4px 24px rgba(0,0,0,.6)}
  .actions{margin-top:14px}
  button{background:linear-gradient(180deg,#c08040,#d9a060);color:#5c3700;border:none;padding:10px 18px;border-radius:6px;font-weight:700;cursor:pointer;font-size:14px}
</style>
</head>
<body>
<h1>Instagram — Post Quadrato</h1>
<p class="info">1080 × 1080</p>
<canvas id="c" width="1080" height="1080"></canvas>
<div class="actions"><button onclick="dl()">⬇ Scarica PNG</button></div>
<script>
const W=1080,H=1080,c=document.getElementById('c'),ctx=c.getContext('2d');
const C={
  brownDeep:'#1a0a02',brownDark:'#2e1508',brownMid:'#5c3317',brownWarm:'#7a4520',
  brownTan:'#c08040',brownSTan:'#d9a060',
  goldDark:'#9a6f08',gold:'#c8960a',goldLight:'#e8b830',
  parchment:'#e8d5b0',parchLight:'#f2e6c8',parchDark:'#c9b48a',
  bgPage:'#100800'
};
const FONTS=Promise.all([
  new FontFace('CinzelDec','url(https://fonts.gstatic.com/s/cinzeldecorative/v17/daaCSScvJGqLYhG8nNt8KPPswUAPni7TTMw.woff2)').load(),
  new FontFace('Cinzel','url(https://fonts.gstatic.com/s/cinzel/v23/8vIU7ww63mVu7gtR-kwKxNvkNOjw-tbnfY3lCA.woff2)').load(),
  new FontFace('CrimsonText','url(https://fonts.gstatic.com/s/crimsontext/v19/wlp2gwHKFkZgtmSR3NB0oRJfbwhT.woff2)').load(),
  new FontFace('FA5','url(https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/webfonts/fa-solid-900.woff2)',{weight:'900'}).load()
]).then(ff=>ff.forEach(f=>document.fonts.add(f)));
FONTS.then(draw,draw);

function draw(){
  /* ═══ PAGE BG ═══ */
  ctx.fillStyle=C.bgPage;ctx.fillRect(0,0,W,H);

  /* ═══ NAVBAR — top ═══ */
  const navH=80;
  const ng=ctx.createLinearGradient(0,0,W*0.8,0);
  ng.addColorStop(0,C.brownDeep);ng.addColorStop(1,C.brownMid);
  ctx.fillStyle=ng;ctx.fillRect(0,0,W,navH);
  ctx.fillStyle=C.goldDark;ctx.fillRect(0,navH-2,W,2);

  ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.font='900 32px FA5';ctx.fillStyle=C.goldLight;
  ctx.shadowColor='rgba(232,184,48,0.8)';ctx.shadowBlur=14;
  ctx.fillText('\uf6cf',30,navH/2);
  ctx.font='bold 34px CinzelDec,serif';
  ctx.fillText('Paths Games',78,navH/2);
  ctx.shadowBlur=0;

  /* ═══ CROWDFUNDING CARD ═══ */
  const cardM=40,cardTop=navH+40;
  const cardW=W-cardM*2, cardH=H-cardTop-90;
  const cx=cardM,cy=cardTop;

  // Parchment bg
  const cbg=ctx.createLinearGradient(cx,cy,cx+cardW,cy+cardH);
  cbg.addColorStop(0,C.parchment);cbg.addColorStop(0.4,C.parchLight);cbg.addColorStop(1,C.parchDark);
  ctx.fillStyle=cbg;roundRect(ctx,cx,cy,cardW,cardH,8);ctx.fill();
  // Shadow
  ctx.shadowColor='rgba(0,0,0,0.6)';ctx.shadowBlur=32;ctx.shadowOffsetY=8;
  ctx.fillStyle=cbg;roundRect(ctx,cx,cy,cardW,cardH,8);ctx.fill();
  ctx.shadowBlur=0;ctx.shadowOffsetY=0;
  // Border
  ctx.strokeStyle=C.goldDark;ctx.lineWidth=3;
  roundRect(ctx,cx,cy,cardW,cardH,8);ctx.stroke();
  ctx.strokeStyle='rgba(200,150,10,0.1)';ctx.lineWidth=1;
  roundRect(ctx,cx+5,cy+5,cardW-10,cardH-10,6);ctx.stroke();

  ctx.textAlign='center';

  // ⚔️
  ctx.font='70px serif';ctx.fillStyle=C.brownDark;
  ctx.fillText('⚔️',W/2,cy+70);

  // Title
  ctx.font='bold 42px CinzelDec,serif';ctx.fillStyle=C.brownDark;
  ctx.shadowColor='rgba(232,184,48,0.5)';ctx.shadowBlur=14;
  ctx.fillText('CROWDFUNDING',W/2,cy+150);
  ctx.fillText('COMING SOON',W/2,cy+205);
  ctx.shadowBlur=0;

  // Divider
  ctx.font='18px serif';ctx.fillStyle=C.brownMid;
  ctx.globalAlpha=0.4;ctx.fillText('— ✦ ⚜ ✦ —',W/2,cy+245);ctx.globalAlpha=1;

  // Description
  ctx.font='24px CrimsonText,Georgia,serif';ctx.fillStyle=C.brownWarm;
  wrapText(ctx,'A new free-to-play adventure inspired by classic gamebooks but reimagined with modern mechanics, branching narratives and a living world that reacts to every choice you make.',W/2,cy+290,cardW-80,34);

  // Sub description
  ctx.font='bold 22px CrimsonText,Georgia,serif';ctx.fillStyle=C.brownDark;
  wrapText(ctx,'The campaign is launching soon. Stay tuned and be among the first to join the quest.',W/2,cy+430,cardW-80,32);

  // Badge grid
  const bLabels=['🔓 Free to Play','📖 Gamebook RPG','🔀 Branching Stories','🔀 Multiple Paths','👥 Multiplayer','💰 Crowdfunding','💻 Open Source'];
  ctx.font='18px Cinzel,serif';
  const bH=38, bPad=12, bGX=12, bGY=12;
  const rows=[bLabels.slice(0,4),bLabels.slice(4)];
  let rowY=cy+530;
  rows.forEach(row=>{
    const widths=row.map(l=>ctx.measureText(l).width+bPad*2);
    const totalW=widths.reduce((a,w)=>a+w,0)+(row.length-1)*bGX;
    let bx=W/2-totalW/2;
    row.forEach((label,i)=>{
      const bw=widths[i];
      const g=ctx.createLinearGradient(bx,rowY,bx,rowY+bH);
      g.addColorStop(0,C.brownTan);g.addColorStop(1,C.brownSTan);
      ctx.fillStyle=g;roundRect(ctx,bx,rowY,bw,bH,6);ctx.fill();
      ctx.strokeStyle='rgba(200,150,10,0.3)';ctx.lineWidth=1;
      roundRect(ctx,bx,rowY,bw,bH,6);ctx.stroke();
      ctx.fillStyle='#5c3700';ctx.textAlign='center';
      ctx.fillText(label,bx+bw/2,rowY+bH/2+6);
      bx+=bw+bGX;
    });
    rowY+=bH+bGY;
  });

  /* ═══ FOOTER ═══ */
  ctx.textAlign='center';
  ctx.font='14px CrimsonText,serif';ctx.fillStyle='rgba(232,213,176,0.5)';
  ctx.fillText('© 2025 Paths Games · pathsgames.com',W/2,H-30);
}

function wrapText(ctx,text,x,y,maxW,lineH){
  const words=text.split(' ');let line='';
  for(const w of words){
    const test=line+w+' ';
    if(ctx.measureText(test).width>maxW&&line){ctx.fillText(line.trim(),x,y);y+=lineH;line=w+' '}
    else line=test;
  }
  ctx.fillText(line.trim(),x,y);
}
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();
}
function dl(){const a=document.createElement('a');a.download='paths-games-ig-post.png';a.href=c.toDataURL('image/png');a.click()}
</script>
</body>
</html>
