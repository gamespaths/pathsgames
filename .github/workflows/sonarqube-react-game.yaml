name: SonarQube Analysis - React game

on:
  push:
    branches: [ develop ]
    paths:
      - "code/frontend/react-game/**"
#  pull_request:
#    branches: [ main, develop ]
#    paths:
#      - 'code/frontend/react-game/**'

jobs:
  sonarqube:
    name: SonarQube Scan - React Game
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: code/frontend/react-game

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: code/frontend/react-game/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_REACT_GAME }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          projectBaseDir: code/frontend/react-game
          args: >
            -Dsonar.projectKey=pathsgames_frontend-react-game
            -Dsonar.organization=gamespaths    
            -Dsonar.projectName="Frontend React Game"
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.sources=src 
            -Dsonar.tests=src/test
            -Dsonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,src/test/**
            -Dsonar.test.inclusions=src/test/**/*.test.jsx,src/test/**/*.test.js
            -Dsonar.branch.name=develop  
            -Dsonar.qualitygate.wait=false
