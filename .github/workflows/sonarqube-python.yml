name: SonarQube Analysis - Python Backend

on:
  push:
    branches: [ develop ] #main,
    paths:
      - 'code/backend/python/**'
#  pull_request:
#    branches: [ main, develop ]
#    paths:
#      - 'code/backend/python/**'

env:
  PYTHON_VERSION: '3.12'

jobs:
  sonarqube-python:
    name: SonarQube Scan - Python
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: code/backend/python

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for SonarQube blame data

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: code/backend/python/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          pytest --cov=app --cov-report=xml:coverage.xml --cov-report=term-missing -v

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar-python
          restore-keys: ${{ runner.os }}-sonar-python

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        with:
          projectBaseDir: code/backend/python
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_PYTHON }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          # NOTE: uses sonar-project.properties in code/backend/python/
