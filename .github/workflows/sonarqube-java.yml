name: SonarQube Analysis - Java Backend

on:
  push:
    branches: [ develop ] #main, 
    paths:
      - "code/backend/java/**"
#  pull_request:
#    branches: [ main, develop ]
#    paths:
#      - 'code/backend/java/**'

env:
  JAVA_VERSION: "21"

jobs:
  sonarqube:
    name: SonarQube Scan - Java
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: code/backend/java

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history needed for SonarQube blame data

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Build and run tests with coverage
        run: mvn clean verify -B

      - name: SonarQube Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_JAVA }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          mvn sonar:sonar \
            -Dsonar.branch.name=develop \
            -Dsonar.projectKey=paths-game-backend-java \
            -Dsonar.organization=gamespaths \
            -Dsonar.projectName="Backend Java" \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.token=${{ secrets.SONAR_TOKEN_JAVA }} \
            -Dsonar.java.source=21 \
            -Dsonar.coverage.jacoco.xmlReportPaths=**/target/site/jacoco/jacoco.xml \
            -Dsonar.qualitygate.wait=false \
            -B
          # NOTE: qualitygate.wait set to false during early development
          # Change to true when coverage and code quality thresholds are met
