name: SonarQube Analysis - AWS Lambda Backend

on:
  push:
    branches: [ develop ] #main,
    paths:
      - 'code/backend/aws/**'
#  pull_request:
#    branches: [ main, develop ]
#    paths:
#      - 'code/backend/aws/**'

env:
  PYTHON_VERSION: '3.13'

jobs:
  sonarqube-aws-lambda:
    name: SonarQube Scan - AWS Lambda
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: code/backend/aws

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for SonarQube blame data

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: code/backend/aws/requirements-test.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: Run tests with coverage
        run: |
          pytest tests/ --cov=lambda --cov-report=xml:coverage.xml --cov-report=term-missing -v
        env:
          PYTHONPATH: lambda

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar-aws-lambda
          restore-keys: ${{ runner.os }}-sonar-aws-lambda

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        with:
          projectBaseDir: code/backend/aws
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_AWS_LAMBDA }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          # NOTE: uses sonar-project.properties in code/backend/aws/
