name: Backend CI

on:
#  push:
#    branches: [ main, develop, 'release/*', 'feature/*' ]
#    paths:
#      - 'code/backend/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'code/backend/**'

env:
  JAVA_VERSION: '21'
  DOCKER_IMAGE: pathsgames/pathsgames

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: code/backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build with Maven
        run: mvn clean install -DskipTests -B

      - name: Run tests
        run: mvn test -B

      - name: Extract version from POM
        if: success()
        id: version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "pom_version=$VERSION" >> $GITHUB_OUTPUT
          echo "release_version=${VERSION%-SNAPSHOT}" >> $GITHUB_OUTPUT

    outputs:
      pom_version: ${{ steps.version.outputs.pom_version }}
      release_version: ${{ steps.version.outputs.release_version }}

  docker-publish:
    name: Docker Build & Push
    needs: build-and-test
    if: >
      success() &&
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/heads/release/'))
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Determine Docker tags
        id: tags
        run: |
          RELEASE_VERSION="${{ needs.build-and-test.outputs.release_version }}"
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "tags=${{ env.DOCKER_IMAGE }}:latest,${{ env.DOCKER_IMAGE }}:${RELEASE_VERSION}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
            echo "tags=${{ env.DOCKER_IMAGE }}:dev" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/heads/release/* ]]; then
            echo "tags=${{ env.DOCKER_IMAGE }}:rc" >> $GITHUB_OUTPUT
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: code/backend
          file: code/backend/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
